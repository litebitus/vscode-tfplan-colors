<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2333"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>

  <!-- + create (green) -->
  <g fill="#3FB950">
    <rect x="17" y="25.5" width="16" height="5" rx="2.5"/>
    <rect x="22.5" y="20" width="5" height="16" rx="2.5"/>
    <rect x="44" y="23.5" width="62" height="9" rx="4.5" opacity="0.4"/>
  </g>

  <!-- ~ update (yellow) -->
  <g>
    <path d="M17 54 q4 -7 8 0 q4 7 8 0" fill="none" stroke="#D29922" stroke-width="5" stroke-linecap="round"/>
    <rect x="44" y="49.5" width="50" height="9" rx="4.5" fill="#D29922" opacity="0.4"/>
  </g>

  <!-- - destroy (red) -->
  <g fill="#F85149">
    <rect x="17" y="77.5" width="16" height="5" rx="2.5"/>
    <rect x="44" y="75.5" width="68" height="9" rx="4.5" opacity="0.4"/>
  </g>

  <!-- ± replace (magenta) -->
  <g fill="#DB61A2">
    <rect x="17" y="99" width="16" height="5" rx="2.5"/>
    <rect x="22.5" y="93.5" width="5" height="16" rx="2.5"/>
    <rect x="17" y="113" width="16" height="5" rx="2.5"/>
    <rect x="44" y="101.5" width="44" height="9" rx="4.5" opacity="0.4"/>
  </g>
</svg>
